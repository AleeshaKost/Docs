<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
  width="180"
  height="23"
  viewBox="0 0 180 23"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="aleesha-kost-logo-title aleesha-kost-logo-description"
>
  <title id="aleesha-kost-logo-title">
    Aleesha Kost Logo
  </title>

  <desc id="aleesha-kost-logo-description">
    Logo Aleesha Kost dengan ikon rumah dan teks Aleesha Kost.
  </desc>

  <!--
    Icon diposisikan agar batas visualnya mendekati:
    kiri   : 0.4
    kanan  : 19
    atas   : 0.4
    bawah  : 22.6
  -->
  <g
    transform="
      translate(1 1)
      scale(0.144827586)
      translate(-90 -95)
    "
  >
    <!-- House Outline -->
    <path
      d="
        M90 150
        L150 95
        L210 150
        V215
        C210 230 195 240 180 240
        H120
        C105 240 90 230 90 215
        Z
      "
      fill="none"
      stroke="#9B6BAF"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Comfort Embrace Curve -->
    <path
      d="
        M120 160
        C135 140 165 140 180 160
        C175 185 125 185 120 160
        Z
      "
      fill="#C9A3D8"
    />

    <!-- Door -->
    <rect
      x="140"
      y="180"
      width="20"
      height="60"
      rx="10"
      fill="#9B6BAF"
    />
  </g>

  <!--
    Text dibuat tinggi agar bagian atas dan bawah visualnya
    sejajar dengan icon.

    textLength memastikan logo menggunakan hampir seluruh
    lebar canvas sampai x=179.
  -->
  <text
    x="22.25"
    y="22"
    textLength="156.75"
    lengthAdjust="spacingAndGlyphs"
    font-family="Inter, Geist, 'Geist Sans', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="29.2"
    font-weight="600"
    font-kerning="normal"
    letter-spacing="-0.025em"
    text-rendering="geometricPrecision"
    xml:space="preserve"
  ><tspan fill="#9B6BAF">Aleesha</tspan><tspan fill="#C9A3D8"> Kost</tspan></text>
</svg>