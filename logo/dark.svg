<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
  width="1536"
  height="600"
  viewBox="0 0 512 200"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="aleesha-kost-logo-title aleesha-kost-logo-description"
  preserveAspectRatio="xMidYMid meet"
>
  <title id="aleesha-kost-logo-title">
    Aleesha Kost Logo
  </title>

  <desc id="aleesha-kost-logo-description">
    Logo Aleesha Kost dengan ikon rumah dan teks Aleesha Kost.
  </desc>

  <!-- Icon -->
  <g transform="matrix(1.25 0 0 1.25 -103.5 -109.375)">
    <!-- House Outline -->
    <path
      d="
        M90 150
        L150 95
        L210 150
        V215
        C210 230 195 240 180 240
        H120
        C105 240 90 230 90 215
        Z
      "
      fill="none"
      stroke="#9B6BAF"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Comfort Embrace Curve -->
    <path
      d="
        M120 160
        C135 140 165 140 180 160
        C175 185 125 185 120 160
        Z
      "
      fill="#C9A3D8"
    />

    <!-- Door -->
    <rect
      x="140"
      y="180"
      width="20"
      height="60"
      rx="10"
      fill="#9B6BAF"
    />
  </g>

  <!-- Brand Name -->
  <text
    x="178"
    y="101"
    textLength="330"
    lengthAdjust="spacingAndGlyphs"
    dominant-baseline="middle"
    font-family="Geist, 'Geist Sans', Arial, sans-serif"
    font-size="58"
    font-weight="600"
    letter-spacing="-1"
  >
    <tspan fill="#9B6BAF">Aleesha</tspan>
    <tspan fill="#C9A3D8"> Kost</tspan>
  </text>
</svg>